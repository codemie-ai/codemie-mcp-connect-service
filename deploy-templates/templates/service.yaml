apiVersion: v1
kind: Service
metadata:
  name: {{ include "codemie-mcp-connect-service.fullname" . }}-headless
  labels:
    {{- include "codemie-mcp-connect-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: mcp
      protocol: TCP
      name: mcp
  clusterIP: None
  selector:
    {{- include "codemie-mcp-connect-service.selectorLabels" . | nindent 4 }}
